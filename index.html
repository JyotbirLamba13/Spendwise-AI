<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ── Favicon ── -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="shortcut icon" href="/favicon.svg" />
    <meta name="theme-color" content="#13261c" />

    <!-- ── Primary SEO ── -->
    <title>ClearSpend — AI Bank Statement Analyzer</title>
    <meta name="description" content="Upload your bank statement and ClearSpend instantly identifies hidden SaaS spend, duplicate charges, and cash flow leaks — 100% private, processed in your browser." />
    <meta name="keywords" content="bank statement analyzer, SaaS spend analysis, expense tracker, financial intelligence, AI finance, cost savings, subscription audit, cash flow" />
    <meta name="robots" content="index, follow" />
    <meta name="author" content="ClearSpend" />

    <!-- ── Open Graph (LinkedIn, WhatsApp, Slack previews) ── -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="ClearSpend" />
    <meta property="og:title" content="ClearSpend — AI Bank Statement Analyzer" />
    <meta property="og:description" content="Upload your bank statement and ClearSpend instantly identifies hidden SaaS spend, duplicate charges, and cash flow leaks — 100% private, processed in your browser." />

    <!-- ── Twitter / X Card ── -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="ClearSpend — AI Bank Statement Analyzer" />
    <meta name="twitter:description" content="Upload your bank statement and ClearSpend instantly identifies hidden SaaS spend, duplicate charges, and cash flow leaks — 100% private, processed in your browser." />

    <!-- ── Structured Data (JSON-LD) ── -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "ClearSpend",
      "description": "AI-powered bank statement analyzer that identifies hidden SaaS spend, duplicate charges, and cash flow leaks. 100% private — processed in your browser.",
      "applicationCategory": "FinanceApplication",
      "operatingSystem": "Web",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      },
      "featureList": [
        "Bank statement analysis",
        "SaaS spend detection",
        "Duplicate transaction detection",
        "Cash flow insights",
        "Privacy-first processing"
      ]
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
