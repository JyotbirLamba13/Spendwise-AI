<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Dark green background -->
  <rect width="32" height="32" rx="7" fill="#13261c"/>
  <!-- Rising bar chart: left (dim) → right (bright) -->
  <rect x="5"  y="22" width="5" height="5"  rx="1.5" fill="#d2f34c" opacity="0.45"/>
  <rect x="13" y="16" width="5" height="11" rx="1.5" fill="#d2f34c" opacity="0.7"/>
  <rect x="21" y="9"  width="5" height="18" rx="1.5" fill="#d2f34c"/>
  <!-- Accent dot above tallest bar = insight spark -->
  <circle cx="23.5" cy="6.5" r="2" fill="#d2f34c"/>
</svg>
